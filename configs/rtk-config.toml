[tracking]
enabled = true
history_days = 90

[display]
colors = true
emoji = true
max_width = 120

[filters]
ignore_dirs = [
    ".git",
    "node_modules",
    "target",
    "__pycache__",
    ".venv",
    "vendor",
]
ignore_files = [
    "*.lock",
    "*.min.js",
    "*.min.css",
]

[tee]
enabled = true
mode = "failures"
max_files = 20
max_file_size = 1048576

[telemetry]
enabled = true

[hooks]
# Commands whose output should NOT be auto-rewritten by rtk's hook.
# This list mirrors the RTK README's recommended example
# (https://github.com/rtk-ai/rtk — see "exclude_commands" in the config section).
# - curl: RTK ships a dedicated `rtk curl` command for explicit invocation;
#         auto-rewriting plain curl tends to mangle response bodies that
#         agents need to inspect verbatim.
# - playwright: full failure logs are needed for debugging E2E tests.
exclude_commands = ["curl", "playwright"]

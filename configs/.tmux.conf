# Prefix on Ctrl-Space — leaves Ctrl-b/Ctrl-a free for shell movement
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# 1-indexed windows/panes (0 is too far from 1 on the keyboard)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse + scrollback + true color
set -g mouse on
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# vi mode in copy-mode (h/j/k/l, v to select, y to yank)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Splits keep CWD; use mnemonic | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config without restart
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Faster command sequences (no escape lag in vim)
set -sg escape-time 10

# Status: minimal, branch-aware-ish
set -g status-style "bg=default,fg=default"
set -g status-left  "#[bold]#S#[default] | "
set -g status-right "%Y-%m-%d %H:%M"
set -g status-left-length 30
